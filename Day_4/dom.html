<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name ="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <title>Items</title>
        <style>
            .container{
                color: var(--text-color);
                text-align: center;
                padding: 20px;
                margin: 20px auto;
                width: 50%;
                border: 2px solid var(--border-color, rgb(247, 243, 243));
                background: transparent;
            }
            h1{
                color: var(--text-color);
            }
            .error-message {
                color: #ff4444;
                font-weight: bold;
                margin-top: 5px;
                display: none;
                font-size: 14px;
            }
            .error-message.show {
                display: block;
            }
            body{
                display:flex;
                flex-direction: column;
                background-color: var(--bg-color, rgb(15, 15, 15));
                color: var(--text-color, #ffffff);
                justify-items: center;
                position: relative;
                font-family: Arial, sans-serif;
                margin: 20px;
                transition: background-color 200ms ease, color 200ms ease;
            }

            /* Theme variables applied by body.light-mode / body.dark-mode */
            body.light-mode{
                --bg-color: #f5f5f5;
                --text-color: #111111;
                --border-color: #d0d0d0;
                --input-bg: #ffffff;
                --button-bg: #e6e6e6;
            }
            body.dark-mode{
                --bg-color: rgb(15, 15, 15);
                --text-color: #ffffff;
                --border-color: rgb(247, 243, 243);
                --input-bg: #333333;
                --button-bg: #222222;
            }
            input[type="text"] {
                padding: 8px;
                width: 200px;
                margin-right: 10px;
                background: var(--input-bg, #333333);
                color: var(--text-color, #ffffff);
                border: 1px solid var(--border-color, rgba(0,0,0,0));
            }
            button {
                padding: 8px 12px;
                margin-right: 5px;
                background: var(--button-bg, #222222);
                color: var(--text-color, #ffffff);
                border: 1px solid var(--border-color, rgba(0,0,0,0));
            }
            ol {
                margin-top: 20px;
                text-align: left;
                padding-left: 20px;
                display: inline-block;
            }
            li {
                margin-bottom: 5px;
            }
            button:hover{
                background-color: lightgray;
                cursor: pointer;
                font-weight: bold;
            }
            ol{
                color: var(--text-color, #ffffff);
            }

        </style>

        <script>



            document.addEventListener('DOMContentLoaded', function () {
                const button = document.getElementById("add-item-btn");
                const removeButton = document.getElementById("remove-item-btn");
                const itemInput = document.getElementById("item-input");
                const itemList = document.getElementById("item-list");
                const errorMsg = document.getElementById("error-message");
                const clock = document.getElementById("Clock");
                const modeDisplay = document.getElementById("mode");
                const modeBtn = document.getElementById("mode-btn");

                // Theme handling: apply, persist and toggle
                function applyTheme(theme){
                    document.body.classList.remove('light-mode','dark-mode');
                    document.body.classList.add(theme + '-mode');
                    if (modeDisplay) modeDisplay.textContent = theme === 'dark' ? 'Dark Mode is Enabled' : 'Light Mode is Enabled';
                    if (modeBtn) modeBtn.textContent = theme === 'dark' ? 'Switch to Light' : 'Switch to Dark';
                    try { localStorage.setItem('theme', theme); } catch(e){}
                }

                function initTheme(){
                    const saved = localStorage.getItem('theme');
                    if (saved === 'dark' || saved === 'light'){
                        applyTheme(saved);
                        return;
                    }
                    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    applyTheme(prefersDark ? 'dark' : 'light');
                }

                if (modeBtn) {
                    modeBtn.addEventListener('click', function(){
                        const isDark = document.body.classList.contains('dark-mode');
                        applyTheme(isDark ? 'light' : 'dark');
                    });
                }
                // Initialize theme on load
                initTheme();

                function updateClock() {
                   clock.textContent = new Date().toLocaleTimeString();
                }
                setInterval(updateClock, 1000);
                updateClock();


                if (!button || !removeButton || !itemInput || !itemList || !errorMsg) return;

                function addItem() {
                    const value = itemInput.value.trim();
                    if (!value) {
                        // Show error message
                        errorMsg.textContent = "Please enter an item before adding!";
                        errorMsg.classList.add('show');
                        itemInput.focus();
                        return;
                    }
                    // Hide error message if input is valid
                    errorMsg.classList.remove('show');
                    const li = document.createElement("li");
                    li.textContent = value;
                    itemList.appendChild(li);
                    itemInput.value = "";
                    itemInput.focus();
                }

                button.addEventListener("click", addItem);

                // allow pressing Enter to add
                itemInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') addItem();
                });

                // hide error message when user starts typing
                itemInput.addEventListener('input', function () {
                    if (itemInput.value.trim()) {
                        errorMsg.classList.remove('show');
                    }
                });

                removeButton.addEventListener("click", function (){
                    if (itemList.lastElementChild) {
                        itemList.removeChild(itemList.lastElementChild);
                    }
                });
            });
        </script>
    </head>
    <body>
        <div class="container">
            <h1>Super Market</h1>
            <p id ="Clock"></p>
            <p id="mode"></p>
            <input type="text" id="item-input" placeholder="Enter your item">
            <div id="error-message" class="error-message"></div>
            <br><br>
            <button id="add-item-btn" type="button">Add Item</button>
            <button id="remove-item-btn" type="button">Remove Item</button>
            <button id="mode-btn" type="button">Check Mode</button>
            <br><br>
            <ol id="item-list">
            
            </ol>
        </div>
    </body>
</html>
