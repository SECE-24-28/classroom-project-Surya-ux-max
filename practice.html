<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Practice</title>
    </head>
    <body>
        <h1>Fetch data from Rest API</h1>
        <button id="fetch-data-btn" type="button">Fetch Data</button>
        <div id="main"></div>
        <script>
            function fetchRecords(){
                let res =  fetch('https://jsonplaceholder.typicode.com/users')
                //fetchind the data
                let data = res.json();
                //returning the data in json format
                data.forEach(obj=>{
                    //iterating the data
                    let p = document.createElement('p');
                    p.innerText = obj.name;
                    document.getElementById('main').appendChild(p);
                })
            }
        </script>
    </body>
