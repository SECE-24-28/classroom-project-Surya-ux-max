<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Practice</title>
    </head>
    <body>
        <h1>Summaaaa </h1>
        <p id="pa"></p>

        <script>
            let stu = {name:"Surya", age:22, place:"Chennai"};
            let para = document.getElementById("pa");
            para.innerHTML = "<b>" + stu.name + "</b> is from <b>" + stu.place + "</b> and his age is <i>" + stu.age + "</i>.";

            //<mark> tag can be also used 
            //inside double Quotes , we can use scripts
            // <b> </b> for bold
            //$ can be used for calling the object values

        </script>
    </body>
