<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survex Tours - Home</title>
    <link rel="stylesheet" href="styles/home.css">
</head>
<style>
     body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
    /* Header / Nav */
    .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        z-index: 60;
        background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.12));
        backdrop-filter: blur(6px);
    }
    .site-nav {
        display: flex;
        gap: 22px;
        align-items: center;
    }
    .site-nav a {
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 8px 12px;
        border-radius: 8px;
        transition: background 160ms ease, transform 120ms ease;
        font-size: 0.98rem;
    }
    .site-nav a:hover {
        background: rgba(255,255,255,0.06);
        transform: translateY(-2px);
    }
    .video-container {
        position: relative;
        height: 100vh;
        width: 100%;
        overflow: hidden;
    }
    .video{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        min-width: 100%;
        min-height: 100%;
    }
    .overlay-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        font-size: 2.5rem;
        font-weight: bold;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
    }
</style>
<body>
    <header class="site-header">
        <nav class="site-nav" aria-label="Main Navigation">
            <a href="home.html">Home</a>
            <a href="packages.html">Travel Packages</a>
            <a href="memories.html">Best Memories</a>
            <a href="booking.html">Booking</a>
            <a href="booking-report.html" download>Booking Report Download</a>
        </nav>
    </header>
    <div class="video-container">
            <video class="video" src="174860-852215326.mp4" autoplay loop muted></video>
            <div class="feature-center" role="region" aria-label="Welcome panel">
                <h1>Welcome to Survex Tours</h1>
                <p>Your adventure starts here — explore the world with us</p>
                <div class="actions">
                    <a class="btn" href="packages.html">Explore Packages</a>
                    <a class="btn" href="booking.html">Request Booking</a>
                </div>
            </div>
    </div>

</body>
