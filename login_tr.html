<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survex Tours</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
    
        .video-container {
            display:flex;
            flex-flow: row wrap;
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        video {
            display:flex;
            flex-flow: row wrap;
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .overlay-text {
            display:flex;
            flex-wrap:wra;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        }

        .overlay-text p {
            font-size: 1.3rem;
            margin-top: 10px;
        }
        
        .get-started-btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 26px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 1rem;
            border-radius: 30px;
            backdrop-filter: blur(25px);
            transition: background 180ms ease, transform 120ms ease, box-shadow 180ms ease;
        }

        .get-started-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
    </style>
</head>

<body>

    <div class="video-container">
        <video src="174860-852215326.mp4" autoplay loop muted></video>

        <div class="overlay-text">
            <h1>Welcome to Survex Tours - We Travel</h1>
            <p>Your gateway to Luxurious Travel Plan and Arrangements - Coming Soon</p>
            <a href="home.html" class="get-started-btn">Get Started</a>
        </div>
        <div class="footer">
            <p style="position: absolute; bottom: 10px; width: 100%; text-align: center; color: white; font-size: 1rem; text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);">
                &copy; 2024 SurveX - Survex Tours. All rights reserved.
            </p>
    </div>


</body>
</html>
